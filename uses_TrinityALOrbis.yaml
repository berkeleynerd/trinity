# This file defines settings for all modules that link against TrinityAL built with OpenGL

Imports:
- ../core_project.yaml

ClCompile:
  PreprocessorDefinitions:
  - TRINITY_PLATFORM=TRINITY_ORBIS
  - TRACK_AL_RESOURCES=0
Link:
  AdditionalLibraryDirectories:
  - ../../autobuild/TrinityAL/$(Platform)/$(PlatformToolset)/
  AdditionalDependencies:
  - SceVideoOut_stub_weak
  - SceGnmDriver_stub_weak
  - ScePm4Dump
  - SceGnf
  - SceShaderBinary
  - SceGpuAddress
  - SceGnmx_debug
  - SceGnm_debug
  - ScePosix_stub_weak
  - ScePad_stub_weak

Configurations:
  Debug|ORBIS:
    Link:
      AdditionalDependencies:
      - TrinityAL_orbis_d
  
  Release|ORBIS:
    Link:
      AdditionalDependencies:
      - TrinityAL_orbis

