name: Final Gate

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number being gated"
        required: false
      head_sha:
        description: "Original pull request head SHA"
        required: false
      base_sha:
        description: "Base branch SHA used for synthetic merge"
        required: false

jobs:
  final-gate:
    runs-on: macos
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Build (central carbon-build action)
        uses: https://git.idril.is/rebecca/safe-lang-ci/.gitea/actions/carbon-build@cef974725e916a49947712d24067a90cb6329402
        with:
          preset: arm64-osx-release
          config: Release
          target: all
          install-to-monolith: "true"
