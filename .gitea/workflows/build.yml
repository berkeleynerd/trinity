name: Build (macOS)

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: "Build coordinator trigger provenance"
        required: false
        default: ""

env:
  CMAKE_BUILD_PARALLEL_LEVEL: "4"
  VCPKG_BINARY_SOURCES: clear;files,/Users/buildrunner/.cache/vcpkg-binary,readwrite

jobs:
  build:
    runs-on: macos
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Configure
        shell: bash
        run: cmake --preset arm64-osx-release -S . -B build -DINSTALL_TO_MONOLITH=ON
      - name: Build
        shell: bash
        run: cmake --build build --config Release --target all
      - name: Test
        shell: bash
        run: ctest -C Release -V --output-on-failure --test-dir build
