name: Build (macOS)

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: "Build coordinator trigger provenance"
        required: false
        default: ""

jobs:
  build:
    runs-on: macos
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Build (central carbon-build action)
        uses: https://git.idril.is/rebecca/safe-lang-ci/.gitea/actions/carbon-build@cef974725e916a49947712d24067a90cb6329402
        with:
          preset: arm64-osx-release
          config: Release
          target: all
          install-to-monolith: "true"
